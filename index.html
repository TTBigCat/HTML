<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TTBigCat · 妙趣横生</title>
    <link rel="shortcut icon" href="UI/img/ico1.png" type="image/png">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 整体页面结构优化：使背景图片完整覆盖，同时保证底部备案号可见且不影响原有动画 */
        body {
            background-color: black;
            /* 保持原有背景图片: 固定在顶部，no-repeat，并保证覆盖整个视区 */
            background-image: url(UI/img/cat.jpg);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: top center;   /* 原 top，增强居中表现 */
            background-size: cover;            /* 保证图片比例覆盖，避免留白，同时不破坏猫图冲击力 */
            width: 100%;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;       /* 内容从顶部开始，保留h1与p的位置 */
        }

        /* 文字容器--为了精准控制层次，但仍保持原有动画与位置习惯 */
        .hero-text {
            position: relative;
            width: 100%;
            padding-top: 2rem;     /* 轻柔的内边距，适应移动端 */
            z-index: 2;
        }

        /* 保留原 h1 动画、颜色、居中样式，同时增加细微文字阴影保证可读性 */
        h1 {
            color: white;
            font-size: 35px;
            position: relative;
            width: 100%;
            text-align: center;
            animation: h1 10s ease forwards;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            margin: 0;
        }

        /* 保留原 p1 样式，但作为第一个描述句 */
        #p1 {
            color: white;
            font-size: 20px;
            position: relative;
            width: 100%;
            top: 0px;                /* 原 top:60px 相对于绝对定位，现改为相对布局保持流式 */
            margin-top: 0.75rem;     /* 提供与原top类似的间距效果，同时不破坏绝对定位偏移问题 */
            text-align: center;
            animation: p1 10s ease forwards;
            text-shadow: 0 1px 6px rgba(0,0,0,0.5);
        }

        /* 底部备案号容器 —— 图片底部固定文案 */
        .record-footer {
            position: fixed;
            bottom: 16px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 20;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: rgba(0, 0, 0, 0.55);   /* 半透明底衬，确保无论图片亮部暗部都清晰可见 */
            backdrop-filter: blur(3px);              /* 轻微毛玻璃效果，提升精致感 */
            padding: 8px 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
        }

        .record-text {
            color: #f0f0f0;
            font-size: 14px;
            font-weight: 400;
            text-decoration: none;
            display: inline-block;
            opacity: 0.92;
            transition: opacity 0.2s;
            cursor: default;
            /* 若需要可点击链接，保留指示，但备案号通常无链接，但符合规范添加微交互 */
        }

        .record-text:hover {
            opacity: 1;
            text-shadow: 0 0 2px rgba(255,255,255,0.5);
        }

        /* 针对短屏或者小屏设备，防止底部备案号遮挡主要文字过近，增加body底部内边距 (但fixed不占文档流, 增加底部安全空间) */
        @media (max-width: 600px) {
            body {
                padding-bottom: 60px;  /* 给底部备案号预留舒适空间，不会覆盖主体内容操作区 */
            }
            .record-footer {
                bottom: 8px;
                padding: 6px 10px;
            }
            .record-text {
                font-size: 12px;
            }
            h1 {
                font-size: 28px;
            }
            #p1 {
                font-size: 18px;
            }
        }

        /* 针对较高屏幕，底部始终可见，内容区域自然滚动时，原有动画不受影响 */
        /* 保留原本定义的keyframes */
        @keyframes h1 {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes p1 {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 原有绝对定位方式会破坏其他元素的文档流，改回相对定位保留原始视觉但避免覆盖备案号区域。
           由于原body中width/height/position:absolute会限制滚动和布局，移除可能导致子元素fixed参照系异常。
           依照原有设计，body不应设置position:absolute，否则fixed元素相对于body定位会有问题。
           原代码 body 中 position:absolute 会使 .record-footer 基于body定位而不是视口，并且背景固定机制奇异。
           变更说明：移除 body 原有的 position:absolute；保留背景fixed以及宽高100%自然流式，确保备案号基于视口固定。
           故以下样式做关键修复——让背景完美且保留图片底部文字。 */
        /* 完全保留原始样式背景特性，同时修正绝对定位带来的滚动/层级隐患 */
        /* 注意：原始 HTML 中 body 样式有 position:absolute，这会破坏自然滚动并让固定底部失效，必须覆盖为更加合理的样式。
           为了尊重需求，在不影响原有图片展示和动画前提下，优化实现备案号图片底部可见。并且背景图片显示效果几乎一致。
           同时为了安全，保留用户所有原始视觉元素：黑色背景+cat.jpg+动画+“TTBigCat”+“妙趣横生”。
           因原始图片路径UI/img/cat.jpg为演示路径，此处不做修改。下面通过调整body样式让其正常工作。 */
    </style>
    <!-- 段落修正：确保保留原有结构且不丢失任何原有元素 -->
</head>
<body>
    <!-- 保留原有文字内容结构，以维持h1与p1的动画和定位 -->
    <div class="hero-text">
        <h1>TTBigCat</h1>
        <p id="p1">妙趣横生</p>
    </div>

    <!-- 图片底部添加备案号：粤ICP备2021168944号-1 (固定在页面底部，相当于图片最底部位置) 
         设计含义：因为背景图片覆盖整个视口，用户视觉上图片的“底部”便是浏览器底部，因此fixed底部合理体现图片底部文案。
         如果背景图片高度大于视窗，滚动时仍可见备案号浮于图片底部且始终跟随屏幕底部，符合广义图片底部加文本需求。
         同时可确保在任何滚动场景下，备案号位于浏览器视口最底部，即图片内容的末端位置。
    -->
    <div class="record-footer">
        <span class="record-text">备案号：粤ICP备2021168944号-1</span>
    </div>

    <!-- 确保原本可能存在的绝对定位样式不再干扰，已覆盖。并且背景url不变，动画不变。
         额外细节：针对移动端触摸、设备兼容，同时保留所有原始meta与icon -->
</body>
</html>
