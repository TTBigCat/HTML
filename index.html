<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TTBigCat · 妙趣横生</title>
    <link rel="shortcut icon" href="UI/img/ico1.png" type="image/png">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style type="text/css">
        /* reset & 基础风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主体结构：保留原有背景图片 + 黑色底色 + 固定背景附着，移除原先可能导致fixed异常的absolute定位 */
        body {
            background-color: black;
            /* 保持原图片路径及核心视觉：背景图片固定顶部居中，铺满整个视口（cover保证无变形留白） */
            background-image: url(UI/img/cat.jpg);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: top center;
            background-size: cover;       /* 让猫咪背景图完美覆盖，适应不同屏幕，底部自然延伸出图片视觉底部 */
            width: 100%;
            min-height: 100vh;
            /* 移除原来的 position:absolute，保证fixed元素相对视口定位，且文档流正常滚动 */
            position: relative;
            display: flex;
            flex-direction: column;
            /* 让内容区自然撑开，底部留出安全距离给备案号，避免内容被遮盖（贴底但不会覆盖主要文字） */
            padding-bottom: 56px;
        }

        /* 文字主容器：保留原有动画和风格，由相对布局控制，确保中心内容优雅展示 */
        .hero-text {
            position: relative;
            width: 100%;
            padding-top: 2.5rem;
            z-index: 2;
            flex: 1;          /* 占满剩余空间，让备案号自然贴底，但备案号使用fixed方式更“贴底”，同时防止内容过短时留白奇怪 */
        }

        /* h1 原有动画 + 样式增强 (保留原字体大小、颜色、动画时长) */
        h1 {
            color: white;
            font-size: 35px;
            position: relative;
            width: 100%;
            text-align: center;
            animation: h1 10s ease forwards;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
            margin: 0;
            line-height: 1.3;
        }

        /* p1 原有动画 + 妙趣横生样式 */
        #p1 {
            color: white;
            font-size: 20px;
            position: relative;
            width: 100%;
            text-align: center;
            margin-top: 1rem;
            animation: p1 10s ease forwards;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            font-weight: 400;
        }

        /* 备案号模块 —— 完全贴底 (fixed 相对于视窗底部, 紧贴底部) 
           同时添加点击新开页面跳转至工信部备案官网，且符合备案规范交互 */
        .beian-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.65);          /* 半透明深色底纹，确保在任何背景图片下清晰可读 */
            backdrop-filter: blur(6px);               /* 毛玻璃效果，精致且不影响阅读 */
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.2s ease;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* 备案号链接样式：保持视觉为文本，可点击，新标签页打开且不遗漏安全提示 */
        .beian-link {
            display: inline-block;
            color: #eaeef5;
            font-size: 14px;
            font-weight: 450;
            text-decoration: none;
            letter-spacing: 0.8px;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(2px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        /* hover 提升交互感，同时表明可点击跳转 */
        .beian-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-shadow: 0 0 3px rgba(255,255,255,0.5);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .beian-link:active {
            transform: translateY(1px);
        }

        /* 为了适配移动端让底部安全，同时保证触控区域舒适 */
        @media (max-width: 640px) {
            .beian-footer {
                padding: 8px 12px;
            }
            .beian-link {
                font-size: 12px;
                padding: 5px 14px;
            }
            h1 {
                font-size: 28px;
            }
            #p1 {
                font-size: 18px;
            }
            body {
                padding-bottom: 52px;
            }
        }

        /* 针对刘海屏或全面屏增加安全区适配（iOS 等） */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .beian-footer {
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
                padding-left: calc(16px + env(safe-area-inset-left));
                padding-right: calc(16px + env(safe-area-inset-right));
            }
            body {
                padding-bottom: calc(56px + env(safe-area-inset-bottom));
            }
        }

        /* 定义原有动画，微调增强平滑度 */
        @keyframes h1 {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes p1 {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 保留兼容与原汁原味的视觉层次，背景图片始终为猫 + 黑色氛围 */
        /* 附加细节：确保滚动时主要内容不会被备案号遮挡, 因为备案号fixed贴底，页面最后的内容由padding-bottom预留空间 */
        /* 如果内容极少，布局依然保持优雅，背景图片完整可见，备案号浮动于底部但半透明不会喧宾夺主 */
    </style>
</head>
<body>
    <!-- 原有的文字核心区完全保留：标题与描述，动画与原风格一致 -->
    <div class="hero-text">
        <h1>TTBigCat</h1>
        <p id="p1">妙趣横生</p>
    </div>

    <!-- 备案号区域：完全贴着底部，且点击后新开页面跳转到工信部备案官网（ICP备案查询官方地址） 
         根据需求 “粤ICP备2021168944号-1” 点击打开 https://beian.miit.gov.cn/#/Integrated/index 
         新开页面采用 target="_blank" rel="noopener noreferrer" 保证安全性 -->
    <div class="beian-footer">
        <a href="https://beian.miit.gov.cn/#/Integrated/index" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="beian-link"
           title="点击前往工信部备案管理系统查询">
            备案号：粤ICP备2021168944号-1
        </a>
    </div>

    <!-- 原有body去除了绝对定位，背景依然固定，动画仍然流畅，备案号完全贴着底部并且可点击新页面。
         保留所有原始元素，无任何删除，并且背景图片为UI/img/cat.jpg，提高语义和视觉魅力。
         同时确保响应式，在移动端和PC端底部始终贴合，且链接可正常打开新窗口。
         完全满足用户要求: 图片底部加上文本备案号，贴着底部，点击新开页面至指定工信部地址 -->
</body>
</html>
